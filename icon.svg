<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- D letterform (block/bracket style with rectangular counter) -->
  <!-- Outer D shape -->
  <path d="
    M 92 108
    L 92 340
    L 175 340
    C 260 340 310 298 310 224
    C 310 150 260 108 175 108
    Z
  " fill="white"/>
  <!-- Inner rectangular cutout (counter of D) -->
  <path d="
    M 155 155
    L 155 293
    L 195 293
    C 242 293 262 267 262 224
    C 262 181 242 155 195 155
    Z
  " fill="url(#bg)"/>

  <!-- N letterform -->
  <rect x="328" y="108" width="48" height="232" fill="white"/>
  <rect x="412" y="108" width="48" height="232" fill="white"/>
  <polygon points="376,108 376,176 412,232 412,108" fill="white"/>
  <polygon points="376,272 376,340 412,340 412,268" fill="white"/>
  <line x1="376" y1="176" x2="412" y2="232" stroke="white" stroke-width="0"/>
  <!-- Diagonal stroke of N -->
  <polygon points="376,108 424,108 460,340 412,340" fill="white"/>
  <!-- Fix N right stem overlap -->
  <rect x="412" y="108" width="48" height="232" fill="white"/>

  <!-- DEPLOYNOTES text -->
  <text
    x="256" y="415"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="44"
    fill="white"
    text-anchor="middle"
    letter-spacing="6"
  >DEPLOYNOTES</text>
</svg>
